<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Your Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #FDF6EC;
      --cream-dark: #F5EDE0;
      --brown: #2C1810;
      --brown-light: #6B5744;
      --brown-muted: #B8A690;
      --terracotta: #C4725A;
      --sage: #7D8F69;
      --gold: #D4A574;
      --rose: #D4A5A5;
      --border: #E8DDD0;
      --white: #FFFCF7;

      --shadow-sm: 0 1px 3px rgba(44, 24, 16, 0.06);
      --shadow-md: 0 4px 16px rgba(44, 24, 16, 0.08);
      --shadow-lg: 0 8px 32px rgba(44, 24, 16, 0.12);
      --shadow-glow: 0 0 20px rgba(212, 165, 116, 0.15);

      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'Crimson Pro', Georgia, serif;
      --font-hand: 'Kalam', cursive;

      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 22px;
      --radius-xl: 32px;

      --chapter-color: var(--terracotta);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 17px;
      line-height: 1.6;
      color: var(--brown);
      background: linear-gradient(160deg, #FDF6EC 0%, #F8EFE2 50%, #FDF6EC 100%);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ===== PARTICLES ===== */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: particle-float linear infinite;
    }

    @keyframes particle-float {
      0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
      8% { opacity: var(--p-opacity, 0.2); }
      85% { opacity: var(--p-opacity, 0.2); }
      100% { transform: translateY(calc(-100vh - 40px)) rotate(180deg) scale(1); opacity: 0; }
    }

    /* ===== SCREENS ===== */
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; }

    /* ===== WELCOME ===== */
    #welcome-screen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
    }

    .welcome-ornament {
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: 0.5em;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fade-up 0.8s ease-out 0.2s forwards;
    }

    .welcome-title {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      color: var(--brown);
      line-height: 1.15;
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fade-up 0.8s ease-out 0.4s forwards;
    }

    .welcome-subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--brown-light);
      max-width: 400px;
      margin-bottom: 2.5rem;
      line-height: 1.7;
      opacity: 0;
      animation: fade-up 0.8s ease-out 0.6s forwards;
    }

    .welcome-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      opacity: 0;
      animation: fade-up 0.8s ease-out 0.8s forwards;
      width: 100%;
      max-width: 320px;
    }

    .welcome-name-label {
      font-family: var(--font-hand);
      font-size: 1.1rem;
      color: var(--brown-light);
    }

    .welcome-name-input {
      width: 100%;
      text-align: center;
      font-family: var(--font-body);
      font-size: 1.2rem;
      color: var(--brown);
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0.85rem 1.25rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .welcome-name-input:focus {
      border-color: var(--gold);
      box-shadow: var(--shadow-md), var(--shadow-glow);
    }

    .welcome-name-input::placeholder {
      color: var(--brown-muted);
      font-weight: 300;
    }

    .welcome-begin {
      font-family: var(--font-display);
      font-size: 1.15rem;
      color: white;
      background: var(--terracotta);
      border: none;
      border-radius: var(--radius-xl);
      padding: 0.85rem 2.5rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: var(--shadow-sm);
      margin-top: 0.25rem;
    }

    .welcome-begin:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      filter: brightness(1.05);
    }

    .welcome-begin:active {
      transform: translateY(0) scale(0.98);
    }

    .welcome-begin:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    /* Continue section */
    .continue-section {
      margin-top: 2.5rem;
      opacity: 0;
      animation: fade-up 0.8s ease-out 1s forwards;
    }

    .continue-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--brown-muted);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .continue-divider::before,
    .continue-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .continue-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.6rem 1.5rem;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--brown-light);
      cursor: pointer;
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.25rem;
    }

    .continue-btn:hover {
      border-color: var(--terracotta);
      color: var(--terracotta);
      background: rgba(196, 114, 90, 0.04);
    }

    /* ===== JOURNEY ===== */
    #journey-screen { flex-direction: column; min-height: 100vh; }

    .journey-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(253, 246, 236, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .journey-back {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--brown-light);
      padding: 0.25rem;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .journey-back:hover {
      background: rgba(44, 24, 16, 0.05);
      color: var(--brown);
    }

    .journey-person-name {
      font-family: var(--font-hand);
      font-size: 1.1rem;
      color: var(--brown);
    }

    .save-indicator {
      font-family: var(--font-body);
      font-size: 0.8rem;
      color: var(--sage);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .save-indicator.visible { opacity: 1; }

    /* Chapter nav */
    .chapter-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      padding: 1rem 1rem 0.5rem;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .chapter-nav::-webkit-scrollbar { display: none; }

    .chapter-dot {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .chapter-dot:hover {
      border-color: var(--chapter-color);
      transform: scale(1.1);
    }

    .chapter-dot.active {
      border-color: var(--chapter-color);
      background: var(--chapter-color);
      box-shadow: 0 0 0 3px rgba(196, 114, 90, 0.15);
      transform: scale(1.15);
    }

    .chapter-dot.active .chapter-dot-icon {
      filter: grayscale(1) brightness(10);
    }

    .chapter-dot.has-answers::after {
      content: '';
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 10px;
      height: 10px;
      background: var(--sage);
      border-radius: 50%;
      border: 2px solid var(--cream);
    }

    .chapter-dot-icon { font-size: 0.85rem; line-height: 1; }

    /* Chapter content */
    .chapter-content {
      flex: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 3rem;
      width: 100%;
      animation: chapter-enter 0.5s ease-out;
    }

    @keyframes chapter-enter {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chapter-header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .chapter-header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 3px;
      background: var(--chapter-color);
      border-radius: 2px;
    }

    .chapter-icon { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; }

    .chapter-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      color: var(--brown);
      margin-bottom: 0.3rem;
    }

    .chapter-subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--brown-muted);
    }

    /* Question grid */
    .question-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .question-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      transition: all 0.3s ease;
      position: relative;
    }

    .question-card:hover {
      border-color: color-mix(in srgb, var(--chapter-color) 40%, var(--border));
      box-shadow: var(--shadow-sm);
    }

    .question-card:focus-within {
      border-color: var(--chapter-color);
      box-shadow: var(--shadow-md), 0 0 0 3px color-mix(in srgb, var(--chapter-color) 10%, transparent);
    }

    .question-card.full { grid-column: 1 / -1; }

    .question-card.answered .question-bloom {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    .question-bloom {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      font-size: 0.85rem;
      opacity: 0;
      transform: scale(0.3) rotate(-90deg);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .question-prompt {
      font-family: var(--font-hand);
      font-size: 1.05rem;
      color: var(--brown);
      margin-bottom: 0.75rem;
      line-height: 1.5;
      padding-right: 1.5rem;
    }

    .question-input {
      width: 100%;
      border: none;
      border-bottom: 1.5px dashed var(--border);
      background: transparent;
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--brown);
      padding: 0.5rem 0;
      resize: none;
      outline: none;
      transition: border-color 0.3s ease;
      line-height: 1.6;
    }

    .question-input:focus {
      border-bottom-color: var(--chapter-color);
      border-bottom-style: solid;
    }

    .question-input::placeholder {
      color: var(--brown-muted);
      font-style: italic;
      font-weight: 300;
    }

    .question-input-short { height: 2.4rem; }
    .question-input-long { min-height: 5rem; }

    /* Nav buttons */
    .chapter-nav-buttons {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .chapter-btn {
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 500;
      padding: 0.75rem 1.75rem;
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .chapter-btn-prev {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--brown-light);
    }

    .chapter-btn-prev:hover {
      border-color: var(--brown-muted);
      background: rgba(44, 24, 16, 0.02);
    }

    .chapter-btn-next {
      background: var(--chapter-color);
      border: none;
      color: white;
      box-shadow: var(--shadow-sm);
    }

    .chapter-btn-next:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
      filter: brightness(1.05);
    }

    .chapter-btn-next:active { transform: translateY(0); }
    .chapter-btn.invisible { visibility: hidden; }

    .chapter-progress {
      font-family: var(--font-hand);
      font-size: 0.9rem;
      color: var(--brown-muted);
      text-align: center;
    }

    /* ===== ARCHIVE ===== */
    #archive-screen { flex-direction: column; padding: 2rem; }

    .archive-header { text-align: center; margin-bottom: 2rem; }

    .archive-header h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .archive-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--brown-light);
      background: none;
      border: none;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }

    .archive-back:hover { color: var(--terracotta); }

    .archive-grid {
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .archive-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .archive-card:hover {
      border-color: var(--gold);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .archive-card-name {
      font-family: var(--font-display);
      font-size: 1.3rem;
      margin-bottom: 0.25rem;
    }

    .archive-card-meta { font-size: 0.85rem; color: var(--brown-muted); }

    .archive-story-detail { max-width: 700px; margin: 0 auto; width: 100%; }

    .archive-response {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .archive-response:last-child { border-bottom: none; }

    .archive-question {
      font-family: var(--font-hand);
      font-size: 1rem;
      color: var(--brown-light);
      margin-bottom: 0.3rem;
    }

    .archive-answer {
      font-family: var(--font-body);
      font-size: 1.05rem;
      color: var(--brown);
      line-height: 1.7;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .question-grid { grid-template-columns: 1fr; }
      .question-card.full { grid-column: 1; }
      .chapter-nav { justify-content: flex-start; padding: 0.75rem 0.75rem 0.25rem; }
      .chapter-dot { width: 32px; height: 32px; font-size: 0.8rem; }
      .chapter-content { padding: 1rem 1rem 2.5rem; }
      .chapter-nav-buttons { flex-wrap: wrap; gap: 0.75rem; }
      .chapter-btn { flex: 1; justify-content: center; min-width: 120px; }
      .journey-header { padding: 0.6rem 1rem; }
      .question-card { padding: 1rem 1.25rem; }
    }

    .question-input[data-autoresize] { overflow: hidden; }

    :focus-visible { outline: 2px solid var(--terracotta); outline-offset: 2px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--brown-muted); }
  </style>
</head>
<body>

  <div id="particles-container"></div>
  <div id="welcome-screen" class="screen active"></div>
  <div id="journey-screen" class="screen"></div>
  <div id="archive-screen" class="screen"></div>

<script>
/* ===== CHAPTERS — all second-person (you/your) ===== */
const CHAPTERS = [
  {

/* ===== STATE ===== */
const state = {
  screen: 'welcome',
  personId: null,
  storyId: null,
  personName: '',
  currentChapter: 0,
  answers: {},
};

/* ===== PARTICLES ===== */
function createParticles() {
  const container = document.getElementById('particles-container');
  const colors = ['#D4A574', '#D4A5A5', '#B5C9A8', '#C5B3D6', '#A3C4D9'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 3 + Math.random() * 5;
    const duration = 15 + Math.random() * 25;
    const delay = Math.random() * duration;
    p.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      bottom: -10px;
      background: ${colors[i % colors.length]};
      animation-duration: ${duration}s;
      animation-delay: -${delay}s;
      --p-opacity: ${0.1 + Math.random() * 0.15};
    `;
    container.appendChild(p);
  }
}

/* ===== API ===== */
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  return res.json();
}

/* ===== LOCAL STORAGE ===== */
function saveToLocal() {
  localStorage.setItem('story_state', JSON.stringify({
    personId: state.personId,
    storyId: state.storyId,
    personName: state.personName,
  }));
}

function getAllLocalStories() {
  try { return JSON.parse(localStorage.getItem('story_list') || '[]'); }
  catch { return []; }
}

function addToStoryList(entry) {
  const list = getAllLocalStories();
  const idx = list.findIndex(s => s.personId === entry.personId);
  if (idx >= 0) list[idx] = entry;
  else list.push(entry);
  localStorage.setItem('story_list', JSON.stringify(list));
}

/* ===== AUTO-SAVE ===== */
let saveDebounce = null;

function autoSave(questionId, answer) {
  if (!state.storyId) return;
  state.answers[questionId] = answer;

  clearTimeout(saveDebounce);
  saveDebounce = setTimeout(async () => {
    const indicator = document.getElementById('save-indicator');
    if (indicator) { indicator.textContent = 'saving...'; indicator.classList.add('visible'); }

    await api('POST', '/api/responses', {
      story_id: state.storyId,
      question: questionId,
      answer: answer,
    });

    if (indicator) { indicator.textContent = 'saved \u2713'; }
    setTimeout(() => { if (indicator) indicator.classList.remove('visible'); }, 1500);
    updateChapterDots();
  }, 800);
}

async function loadAnswers() {
  if (!state.storyId) return;
  const responses = await api('GET', `/api/responses/${state.storyId}`);
  state.answers = {};
  responses.forEach(r => { state.answers[r.question] = r.answer; });
}

/* ===== SCREENS ===== */
function showScreen(name) {
  state.screen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`${name}-screen`).classList.add('active');
}

/* ===== WELCOME ===== */
function renderWelcome() {
  const stories = getAllLocalStories();

  document.getElementById('welcome-screen').innerHTML = `
    <div class="welcome-ornament">\u2727 \u00B7 \u2727 \u00B7 \u2727</div>
    <h1 class="welcome-title">Share Your Story</h1>
    <p class="welcome-subtitle">
      Everyone has a story worth preserving.<br>
      Let\u2019s capture yours, one memory at a time.
    </p>

    <div class="welcome-form">
      <label class="welcome-name-label">What\u2019s your name?</label>
      <input type="text" class="welcome-name-input" id="welcome-name" placeholder="Your first name..." autocomplete="given-name">
      <button class="welcome-begin" id="welcome-begin-btn" disabled>Begin Your Story</button>
    </div>

    ${stories.length > 0 ? `
      <div class="continue-section">
        <div class="continue-divider">or pick up where you left off</div>
        ${stories.map(s => `
          <button class="continue-btn" data-person-id="${s.personId}" data-story-id="${s.storyId}">
            \u{1F4D6} ${s.personName}\u2019s Story
          </button>
        `).join(' ')}
      </div>
    ` : ''}
  `;

  const nameInput = document.getElementById('welcome-name');
  const beginBtn = document.getElementById('welcome-begin-btn');

  nameInput.addEventListener('input', () => {
    beginBtn.disabled = !nameInput.value.trim();
  });

  nameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && nameInput.value.trim()) startNewStory(nameInput.value.trim());
  });

  beginBtn.addEventListener('click', () => {
    if (nameInput.value.trim()) startNewStory(nameInput.value.trim());
  });

  document.querySelectorAll('.continue-btn').forEach(btn => {
    btn.addEventListener('click', () => continueStory(
      parseInt(btn.dataset.personId),
      parseInt(btn.dataset.storyId),
    ));
  });
}

/* ===== START / CONTINUE ===== */
async function startNewStory(name) {
  state.personName = name;
  const result = await api('POST', '/api/persons', { name, age_group: '' });
  state.personId = result.person_id;
  state.storyId = result.story_id;
  state.currentChapter = 0;
  state.answers = {};

  saveToLocal();
  addToStoryList({ personId: state.personId, storyId: state.storyId, personName: name });

  showScreen('journey');
  renderJourney();
}

async function continueStory(personId, storyId) {
  state.personId = personId;
  state.storyId = storyId;
  state.currentChapter = 0;
  await loadAnswers();

  const stories = getAllLocalStories();
  const entry = stories.find(s => s.personId === personId);
  state.personName = entry?.personName || 'You';

  showScreen('journey');
  renderJourney();
}

/* ===== JOURNEY ===== */
function renderJourney() {
  const chapter = CHAPTERS[state.currentChapter];
  document.documentElement.style.setProperty('--chapter-color', chapter.color);

  document.getElementById('journey-screen').innerHTML = `
    <header class="journey-header">
      <button class="journey-back" onclick="goHome()" title="Back to home">\u2190</button>
      <span class="journey-person-name" id="journey-person-name">${state.personName}\u2019s Story</span>
      <span class="save-indicator" id="save-indicator">saved \u2713</span>
    </header>

    <nav class="chapter-nav" id="chapter-nav">
      ${CHAPTERS.map((ch, i) => `
        <div class="chapter-dot ${i === state.currentChapter ? 'active' : ''} ${hasChapterAnswers(i) ? 'has-answers' : ''}"
             data-index="${i}" title="${ch.title}"
             style="${i === state.currentChapter ? `border-color: ${ch.color}; background: ${ch.color};` : ''}">
          <span class="chapter-dot-icon">${ch.icon}</span>
        </div>
      `).join('')}
    </nav>

    <main class="chapter-content" id="chapter-content">
      ${renderChapter(state.currentChapter)}
    </main>
  `;

  document.querySelectorAll('.chapter-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      const idx = parseInt(dot.dataset.index);
      if (idx !== state.currentChapter) { state.currentChapter = idx; renderJourney(); }
    });
  });

  bindInputEvents();
  document.querySelectorAll('textarea.question-input').forEach(autoResizeTextarea);

  const activeDot = document.querySelector('.chapter-dot.active');
  if (activeDot) activeDot.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function renderChapter(index) {
  const chapter = CHAPTERS[index];
  const isFirst = index === 0;
  const isLast = index === CHAPTERS.length - 1;
  const next = !isLast ? CHAPTERS[index + 1] : null;
  const prev = !isFirst ? CHAPTERS[index - 1] : null;

  const questionsHtml = chapter.questions.map(q => {
    const qKey = `${chapter.id}_${q.id}`;
    const saved = state.answers[qKey] || '';
    const answered = saved.trim().length > 0;

    return `
      <div class="question-card ${q.size === 'full' ? 'full' : ''} ${answered ? 'answered' : ''}">
        <span class="question-bloom">\u2728</span>
        <label class="question-prompt">${q.text}</label>
        ${q.type === 'long' ? `
          <textarea class="question-input question-input-long" data-question-id="${qKey}" data-autoresize placeholder="${q.placeholder || ''}">${saved}</textarea>
        ` : `
          <input type="text" class="question-input question-input-short" data-question-id="${qKey}" placeholder="${q.placeholder || ''}" value="${saved.replace(/"/g, '&quot;')}">
        `}
      </div>
    `;
  }).join('');

  return `
    <div class="chapter-header">
      <span class="chapter-icon">${chapter.icon}</span>
      <h2 class="chapter-title">${chapter.title}</h2>
      <p class="chapter-subtitle">${chapter.subtitle}</p>
    </div>

    <div class="question-grid">${questionsHtml}</div>

    <div class="chapter-nav-buttons">
      <button class="chapter-btn chapter-btn-prev ${isFirst ? 'invisible' : ''}" onclick="goChapter(${index - 1})">
        \u2190 ${prev ? prev.title : ''}
      </button>
      <span class="chapter-progress">${index + 1} of ${CHAPTERS.length}</span>
      ${isLast ? `
        <button class="chapter-btn chapter-btn-next" onclick="goHome()" style="background: var(--sage)">Finish \u2713</button>
      ` : `
        <button class="chapter-btn chapter-btn-next" onclick="goChapter(${index + 1})" style="background: ${next.color}">
          ${next.title} \u2192
        </button>
      `}
    </div>
  `;
}

function bindInputEvents() {
  document.querySelectorAll('.question-input').forEach(input => {
    input.addEventListener('input', () => {
      const val = input.value ?? input.textContent ?? '';
      autoSave(input.dataset.questionId, val);
      const card = input.closest('.question-card');
      if (val.trim()) card.classList.add('answered');
      else card.classList.remove('answered');
    });
  });
}

function autoResizeTextarea(ta) {
  const resize = () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; };
  ta.addEventListener('input', resize);
  if (ta.value) resize();
}

function hasChapterAnswers(i) {
  const ch = CHAPTERS[i];
  return ch.questions.some(q => {
    const key = `${ch.id}_${q.id}`;
    return state.answers[key]?.trim().length > 0;
  });
}

function updateChapterDots() {
  document.querySelectorAll('.chapter-dot').forEach(dot => {
    const idx = parseInt(dot.dataset.index);
    dot.classList.toggle('has-answers', hasChapterAnswers(idx));
  });
}

function goChapter(index) {
  if (index < 0 || index >= CHAPTERS.length) return;
  state.currentChapter = index;
  renderJourney();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  showScreen('welcome');
  renderWelcome();
}

/* ===== INIT ===== */
createParticles();
renderWelcome();
</script>
